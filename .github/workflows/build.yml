name: Build Telo VPN

on:
  push:
    branches: [ main, master, "claude/*", "release/*" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download libXray AAR
        run: |
          mkdir -p app/libs
          curl -fsSL -o app/libs/libXray.aar \
            "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar"
          echo "libXray.aar indirildi: $(du -sh app/libs/libXray.aar | cut -f1)"

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            artifacts/TeloVPN-debug-${{ github.run_number }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TeloVPN-debug-apk
          path: artifacts/*.apk
          retention-days: 30
